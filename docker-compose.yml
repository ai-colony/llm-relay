services:
  llm-relay:
    build: .
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_FILENAME: /app/data/database.sqlite
      OPENAI_URL: http://host.docker.internal:8080/v1
      OPENAI_MODEL: ''
      OPENAI_KEY: none
      OPENAI_TIMEOUT: 10000
    volumes:
      - llm-relay-data:/app/data
    restart: unless-stopped

volumes:
  llm-relay-data:
