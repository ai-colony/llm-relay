name: Publish Docker Image

on:
  push:
    paths:
      - package.json
    branches:
      - main

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2 # Fetch the last 2 commits to access HEAD~1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'npm'

      - name: Detect version change
        id: detect_version
        run: |
          # Get the current and previous versions from package.json
          CURRENT_VERSION=$(jq -r '.version' package.json)
          PREVIOUS_VERSION=$(git show HEAD~1:package.json | jq -r '.version')

          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version upgraded from $PREVIOUS_VERSION to $CURRENT_VERSION."
            echo "version_changed=true" >> $GITHUB_ENV
            echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
            echo "REPOSITORY=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          else
            echo "No version upgrade detected."
          fi

      - name: Set up QEMU
        if: env.version_changed == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: env.version_changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: env.version_changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: env.version_changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ env.REPOSITORY }}:${{ env.CURRENT_VERSION }}
